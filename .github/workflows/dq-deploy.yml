name: Deploy DQ Validation Bundles

on:
  pull_request:
    branches: [main]
    paths: ['dq_jobs/**']
  push:
    branches: [main]
    paths: ['dq_jobs/**']

permissions:
  contents: read

jobs:
  deploy_dq_bundles:
    runs-on: ubuntu-latest
    name: Deploy Databricks Validation Bundle
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_TERRAFORM_CHECKSUM_VERIFICATION: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.298.0

      - name: Validate Databricks secrets
        id: secrets_check
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "secrets_available=false" >> "$GITHUB_OUTPUT"
              echo "Secrets not available (PR context). Skipping Databricks steps."
            else
              echo "Missing required Databricks secrets"
              exit 1
            fi
          else
            echo "secrets_available=true" >> "$GITHUB_OUTPUT"
            echo "Databricks credentials verified."
          fi

      - name: Detect bundle changes
        id: bundle_changes
        run: |
          BUNDLES=$(find dq_jobs -name databricks.yml -type f | head -5)

          if [ -z "$BUNDLES" ]; then
            echo "No bundles found."
            exit 0
          fi

          {
            echo "bundles<<EOF"
            echo "$BUNDLES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          for b in $BUNDLES; do
            echo "Found bundle: $b"
          done

      - name: Validate Databricks bundles
        if: steps.bundle_changes.outputs.bundles && steps.secrets_check.outputs.secrets_available == 'true'
        run: |
          for bundle_path in ${{ steps.bundle_changes.outputs.bundles }}; do
            dir=$(dirname "$bundle_path")
            echo "Validating bundle in $dir"
            cd "$dir"
            databricks bundle validate -t dev
            cd - > /dev/null
          done

      - name: Deploy Databricks bundles
        if: github.event_name == 'push' && steps.secrets_check.outputs.secrets_available == 'true'
        run: |
          for bundle_path in ${{ steps.bundle_changes.outputs.bundles }}; do
            dir=$(dirname "$bundle_path")
            echo "Deploying bundle in $dir"
            cd "$dir"
            databricks bundle deploy -t dev
            cd - > /dev/null
          done

      - name: Run validation jobs
        if: github.event_name == 'push' && steps.secrets_check.outputs.secrets_available == 'true'
        run: |
          for bundle_path in ${{ steps.bundle_changes.outputs.bundles }}; do
            dir=$(dirname "$bundle_path")

            job_key=$(awk '
              /^[[:space:]]*jobs:/ { in_jobs=1; next }
              in_jobs && /^[[:space:]]*[A-Za-z0-9_.-]+:/ {
                key=$1
                sub(":", "", key)
                print key
                exit
              }
            ' "$bundle_path")

            echo "Running job $job_key from $dir"
            cd "$dir"
            databricks bundle run "$job_key" -t dev
            cd - > /dev/null
          done

      - name: Report deployment status
        if: always()
        run: |
          echo "## DQ Bundle Deployment Status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Secrets available: ${{ steps.secrets_check.outputs.secrets_available }}" >> "$GITHUB_STEP_SUMMARY"